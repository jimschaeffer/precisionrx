<!-- ============================================ -->
<!--                 Navigation                   -->
<!-- ============================================ -->

<header id="cs-navigation">
  <div class="cs-container">
    <!--Nav Logo-->
    <!--Logo is turned white in the css with a filter on dark mode-->
    <a href="/" class="cs-logo" aria-label="Return to Home">
      <img
        src="/assets/images/logo.png"
        alt="logo"
        width="210"
        height="29"
        aria-hidden="true"
        decoding="async"
      />
    </a>
    <!--Navigation List-->
    <nav class="cs-nav" role="navigation">
      <!--Mobile Nav Toggle-->
      <button class="cs-toggle" aria-label="mobile menu toggle">
        <div class="cs-box" aria-hidden="true">
          <span class="cs-line cs-line1" aria-hidden="true"></span>
          <span class="cs-line cs-line2" aria-hidden="true"></span>
          <span class="cs-line cs-line3" aria-hidden="true"></span>
        </div>
      </button>
      <!-- We need a wrapper div so we can set a fixed height on the cs-ul in case the nav list gets too long from too many dropdowns being opened and needs to have an overflow scroll. This wrapper acts as the background so it can go the full height of the screen and not cut off any overflowing nav items while the cs-ul stops short of the bottom of the screen, which keeps all nav items in view no matter how mnay there are-->
      <div class="cs-ul-wrapper">
        <ul id="cs-expanded" class="cs-ul" aria-expanded="false">
          <li class="cs-li">
            <a href="/" class="cs-li-link cs-active"> Home </a>
          </li>
          <li class="cs-li">
            <a href="/" class="cs-li-link"> About </a>
          </li>
          <!--Copy and paste this cs-dropdown list item and replace any .cs-li with this cs-dropdown group to make a new dropdown and it will work-->
          <li class="cs-li cs-dropdown" tabindex="0">
            <span class="cs-li-link">
              Common Compounds
              <img
                class="cs-drop-icon"
                src="/assets/svgs/down.svg"
                alt="dropdown icon"
                width="15"
                height="15"
                decoding="async"
                aria-hidden="true"
              />
            </span>
            <ul class="cs-drop-ul">
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link">Hormone Therapy</a>
              </li>
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link">Pain Management</a>
              </li>
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link">Dermatology</a>
              </li>
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link"
                  >Pediatric Medicine</a
                >
              </li>
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link">Women's Health</a>
              </li>
              <li class="cs-drop-li">
                <a href="" class="cs-li-link cs-drop-link"
                  >Veterinary Medicine</a
                >
              </li>
            </ul>
          </li>
          <li class="cs-li">
            <a href="" class="cs-li-link"> For Prescribers </a>
          </li>
          <li class="cs-li">
            <a href="/blog" class="cs-li-link"> Insights </a>
          </li>
          <li class="cs-li">
            <a href="" class="cs-li-link"> Contact </a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="cs-contact-group">
      <a href="tel:{{client.phoneForTel}}" class="cs-phone">
        <img
          class="cs-phone-icon"
          src="/assets/svgs/phone-1.svg"
          alt="logo"
          width="24"
          height="24"
          aria-hidden="true"
          decoding="async"
        />
        {{client.phoneFormatted}}
      </a>
      <div class="cs-social">
        <a
          href="{{client.socials.facebook}}"
          target="_blank"
          class="cs-social-link"
          aria-label="social media link"
        >
          <img
            class="cs-social-icon"
            src="/assets/svgs/facebook-1.svg"
            alt="logo"
            width="12"
            height="12"
            aria-hidden="true"
            decoding="async"
          />
        </a>
        <a
          href="{{client.socials.instagram}}"
          class="cs-social-link"
          aria-label="social media link"
        >
          <img
            class="cs-social-icon"
            src="/assets/svgs/instagram-1.svg"
            alt="logo"
            width="12"
            height="12"
            aria-hidden="true"
            decoding="async"
          />
        </a>
        <a href="" class="cs-social-link" aria-label="social media link">
          <img
            class="cs-social-icon"
            src="/assets/svgs/google-1.svg"
            alt="logo"
            width="12"
            height="12"
            aria-hidden="true"
            decoding="async"
          />
        </a>
      </div>
    </div>
  </div>
</header>
